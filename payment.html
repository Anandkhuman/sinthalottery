<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Redirect</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            color: white;
            padding: 15px;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: rgba(255,255,255,0.08);
            padding: 25px 20px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: fadeUp 0.8s ease;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sub {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 15px;
        }

        .loader {
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #00f2fe;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .text {
            font-size: 16px;
            margin-top: 10px;
            animation: fadeIn 1.5s infinite alternate;
        }

        .steps {
            margin-top: 15px;
            font-size: 13px;
            opacity: 0.8;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 18px;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #00f2fe;
            animation: load 3s linear forwards;
        }

        .small {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }

        /* Mobile tweaks */
        @media (max-width: 400px) {
            .card {
                padding: 20px 15px;
                border-radius: 15px;
            }

            .logo {
                font-size: 20px;
            }

            .text {
                font-size: 14px;
            }
        }
    </style>

    <script>
        window.onload = function() {
            const steps = [
                "Initializing secure session...",
                "Encrypting connection...",
                "Connecting to payment gateway...",
                "Redirecting..."
            ];

            let i = 0;
            const stepEl = document.getElementById("steps");

            const interval = setInterval(() => {
                if (stepEl) stepEl.innerText = steps[i];
                i++;
                if (i >= steps.length) clearInterval(interval);
            }, 700);

            setTimeout(function() {
                window.location.href = "https://rzp.io/rzp/vEsnxZg9";
            }, 3000);

            let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
            audio.play().catch(() => {});
        }
    </script>
</head>

<body>

<div class="card">
    <div class="logo">🔒 Secure Payment</div>
    <div class="sub">Powered by trusted gateway</div>

    <div class="loader"></div>

    <div class="text">Processing your request...</div>
    <div class="steps" id="steps">Starting...</div>

    <div class="progress-bar">
        <div class="progress"></div>
    </div>

    <div class="small">Please do not refresh or close this page</div>
</div>

</body>
</html>
