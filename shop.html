
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sintha Shop Pro | Management System</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f1f5f9;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #f8fafc; color: var(--dark); margin: 0; padding-bottom: 90px; }

        /* Header */
        .header { 
            background: var(--white); padding: 15px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .shop-name { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }

        /* Dashboard Stats */
        .stats-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .stat-card { 
            background: var(--white); padding: 15px; border-radius: 12px; 
            box-shadow: var(--shadow); border-left: 4px solid var(--primary);
        }
        .stat-card.full { grid-column: span 2; border-left-color: var(--success); }
        .stat-label { font-size: 0.65rem; color: var(--secondary); font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: 700; margin-top: 4px; }

        /* Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--white);
            display: flex; justify-content: space-around; padding: 12px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 2000;
            border-top: 1px solid #eee;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--secondary); font-size: 0.7rem; font-weight: 500;
        }
        .nav-item i { font-size: 1.3rem; margin-bottom: 3px; }
        .nav-item.active { color: var(--primary); }

        /* Cards & Forms */
        .container { padding: 10px 15px; }
        .card { background: var(--white); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--secondary); margin-bottom: 4px; }
        input, select { 
            width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; 
            border-radius: 10px; font-size: 0.9rem; outline: none; 
        }
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            font-weight: 600; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; gap: 8px; transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 1.5px solid var(--primary); color: var(--primary); }

        /* Scanner */
        .scanner-box { 
            width: 100%; background: #000; border-radius: 12px; 
            overflow: hidden; position: relative; aspect-ratio: 1; margin-bottom: 15px;
        }
        .cam-toggle {
            position: absolute; bottom: 10px; right: 10px; z-index: 10;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
            border: none; color: white; width: 40px; height: 40px; border-radius: 50%;
        }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center;
            justify-content: center; z-index: 5000; padding: 20px;
        }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; }

        /* Search Results */
        .search-results {
            background: white; border: 1px solid #e2e8f0; border-radius: 10px;
            max-height: 200px; overflow-y: auto; margin-top: 5px; display: none;
        }
        .search-item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.75rem; color: var(--secondary); padding: 10px 5px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px 5px; font-size: 0.85rem; border-bottom: 1px solid #f1f5f9; }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <div class="shop-name"><i class="fas fa-store"></i> SINTHA SHOP</div>
    <div style="text-align: right; line-height: 1.2;">
        <small id="currentDay" style="color: var(--secondary); font-weight: 600;"></small>
    </div>
</div>

<div class="container">
    
    <!-- DASHBOARD PAGE -->
    <div id="dashPage" class="page active">
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Today Sales</div>
                <div id="statToday" class="stat-value">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Weekly</div>
                <div id="statWeek" class="stat-value">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Monthly</div>
                <div id="statMonth" class="stat-value">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Yearly</div>
                <div id="statYear" class="stat-value">₹0</div>
            </div>
            <div class="stat-card full">
                <div class="stat-label">Total Stock Value (Investment)</div>
                <div id="statStockValue" class="stat-value">₹0</div>
            </div>
        </div>
        <div class="card">
            <div class="card-title"><i class="fas fa-chart-line"></i> Sales Overview</div>
            <canvas id="salesChart" height="180"></canvas>
        </div>
    </div>

    <!-- STOCK ADD PAGE -->
    <div id="addPage" class="page">
        <div class="card">
            <div class="card-title"><i class="fas fa-barcode"></i> Add Stock</div>
            <div class="scanner-box">
                <div id="readerAdd"></div>
                <button class="cam-toggle" onclick="switchCamera()"><i class="fas fa-camera-rotate"></i></button>
            </div>
            <button class="btn btn-outline" onclick="openProductModal('', 'add')">
                <i class="fas fa-keyboard"></i> Manual Entry (No QR)
            </button>
        </div>
    </div>

    <!-- SELL PAGE -->
    <div id="sellPage" class="page">
        <div class="card">
            <div class="card-title"><i class="fas fa-cart-shopping"></i> Billing</div>
            <div class="scanner-box">
                <div id="readerSell"></div>
                <button class="cam-toggle" onclick="switchCamera()"><i class="fas fa-camera-rotate"></i></button>
            </div>
            
            <div class="form-group" style="position:relative">
                <label>Search Product Name or ID</label>
                <input type="text" id="productSearchInput" placeholder="Type to search..." oninput="searchProducts(this.value)">
                <div id="searchResults" class="search-results"></div>
            </div>

            <div class="table-container">
                <table>
                    <thead><tr><th>Item</th><th>Qty</th><th>Total</th><th></th></tr></thead>
                    <tbody id="cartBody"></tbody>
                </table>
            </div>

            <div style="margin-top:20px; border-top:2px solid #f1f5f9; padding-top:15px">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                    <span style="font-weight:600">Total:</span>
                    <span style="font-size:1.4rem; font-weight:700; color:var(--primary)">₹<span id="cartTotal">0</span></span>
                </div>
                <input type="text" id="custName" placeholder="Customer Name" style="margin-bottom:10px">
                <input type="number" id="custMobile" placeholder="WhatsApp Number" style="margin-bottom:15px">
                <button class="btn btn-success" onclick="checkout()">
                    <i class="fas fa-file-invoice-dollar"></i> Generate Bill & Send
                </button>
            </div>
        </div>
    </div>

    <!-- HISTORY PAGE -->
    <div id="historyPage" class="page">
        <div class="card">
            <div class="card-title"><i class="fas fa-history"></i> Sales History</div>
            <div class="form-group">
                <input type="text" id="historySearch" placeholder="Search Customer, Mobile or ID..." oninput="renderHistory()">
            </div>
            <div class="form-group">
                <select id="historyFilter" onchange="renderHistory()">
                    <option value="all">All Time</option>
                    <option value="today">Today</option>
                    <option value="yesterday">Yesterday</option>
                    <option value="thisMonth">This Month</option>
                </select>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- INVENTORY PAGE -->
    <div id="reportPage" class="page">
        <div class="card">
            <div class="card-title"><i class="fas fa-boxes"></i> Inventory List</div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Product</th><th>Price</th><th>Stock</th></tr></thead>
                    <tbody id="inventoryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- PRODUCT MODAL -->
<div id="productModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0">Product Details</h3>
        <input type="hidden" id="modalMode">
        <div class="form-group">
            <label>Product ID</label>
            <input type="text" id="mId">
        </div>
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="mName">
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="mPrice">
            </div>
            <div class="form-group">
                <label id="mQtyLabel">Qty</label>
                <input type="number" id="mQty" value="1">
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="modalBtn" onclick="submitModal()">Save</button>
        </div>
    </div>
</div>

<!-- NAVIGATION BAR -->
<div class="bottom-nav">
    <a href="javascript:void(0)" class="nav-item active" onclick="showPage('dashPage', this)"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="javascript:void(0)" class="nav-item" onclick="showPage('addPage', this)"><i class="fas fa-plus-circle"></i><span>Stock</span></a>
    <a href="javascript:void(0)" class="nav-item" onclick="showPage('sellPage', this)"><i class="fas fa-shopping-cart"></i><span>Sell</span></a>
    <a href="javascript:void(0)" class="nav-item" onclick="showPage('historyPage', this)"><i class="fas fa-history"></i><span>History</span></a>
    <a href="javascript:void(0)" class="nav-item" onclick="showPage('reportPage', this)"><i class="fas fa-boxes"></i><span>Stock</span></a>
</div>

<script>
    // --- Data Storage ---
    let inventory = JSON.parse(localStorage.getItem('sintha_v4_inv')) || {};
    let sales = JSON.parse(localStorage.getItem('sintha_v4_sales')) || [];
    let cart = [];
    let activeScanner = null;
    let currentCamera = "environment";

    // --- Page Logic ---
    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');

        if(activeScanner) { activeScanner.stop(); activeScanner = null; }

        if(pageId === 'dashPage') updateDashboard();
        if(pageId === 'addPage') startScanner("readerAdd", "add");
        if(pageId === 'sellPage') startScanner("readerSell", "sell");
        if(pageId === 'reportPage') renderInventory();
        if(pageId === 'historyPage') renderHistory();
    }

    // --- Scanner Logic ---
    function startScanner(divId, mode) {
        activeScanner = new Html5Qrcode(divId);
        activeScanner.start(
            { facingMode: currentCamera }, 
            { fps: 10, qrbox: 250 },
            (text) => { openProductModal(text, mode); }
        ).catch(err => console.log("Camera entry suppressed"));
    }

    function switchCamera() {
        currentCamera = currentCamera === "environment" ? "user" : "environment";
        const activePage = document.querySelector('.page.active').id;
        if(activeScanner) {
            activeScanner.stop().then(() => {
                if(activePage === 'addPage') startScanner("readerAdd", "add");
                if(activePage === 'sellPage') startScanner("readerSell", "sell");
            });
        }
    }

    // --- Product Modal ---
    function openProductModal(id, mode) {
        document.getElementById('productModal').style.display = 'flex';
        document.getElementById('modalMode').value = mode;
        document.getElementById('mId').value = id;
        
        const item = inventory[id];
        if(item) {
            document.getElementById('mName').value = item.name;
            document.getElementById('mPrice').value = item.price;
        } else {
            document.getElementById('mName').value = '';
            document.getElementById('mPrice').value = '';
        }

        if(mode === 'add') {
            document.getElementById('modalTitle').innerText = "Inventory Update";
            document.getElementById('mQtyLabel').innerText = "Add Quantity";
            document.getElementById('modalBtn').innerText = "Update Stock";
        } else {
            document.getElementById('modalTitle').innerText = "Billing Entry";
            document.getElementById('mQtyLabel').innerText = "Sell Quantity";
            document.getElementById('modalBtn').innerText = "Add to Bill";
        }
    }

    function closeModal() { document.getElementById('productModal').style.display = 'none'; }

    function submitModal() {
        const id = document.getElementById('mId').value;
        const name = document.getElementById('mName').value;
        const price = parseFloat(document.getElementById('mPrice').value);
        const qty = parseInt(document.getElementById('mQty').value);
        const mode = document.getElementById('modalMode').value;

        if(!id || !name || isNaN(price) || isNaN(qty)) return alert("Fill all fields!");

        if(mode === 'add') {
            if(inventory[id]) {
                inventory[id].stock += qty;
                inventory[id].price = price;
            } else {
                inventory[id] = { name, price, stock: qty };
            }
            localStorage.setItem('sintha_v4_inv', JSON.stringify(inventory));
            alert("Stock Saved");
        } else {
            const existing = cart.find(c => c.id === id);
            if(existing) {
                existing.qty += qty;
                existing.total = existing.qty * existing.price;
            } else {
                cart.push({ id, name, price, qty, total: price * qty });
            }
            renderCart();
            document.getElementById('productSearchInput').value = '';
        }
        closeModal();
    }

    // --- Billing Search ---
    function searchProducts(query) {
        const results = document.getElementById('searchResults');
        if(!query) { results.style.display = 'none'; return; }
        let html = '';
        for(let id in inventory) {
            if(id.includes(query) || inventory[id].name.toLowerCase().includes(query.toLowerCase())) {
                html += `<div class="search-item" onclick="openProductModal('${id}', 'sell')">
                    <b>${inventory[id].name}</b> <small>(${id})</small><br>
                    <span style="font-size:0.8rem; color:var(--secondary)">₹${inventory[id].price} | Stock: ${inventory[id].stock}</span>
                </div>`;
            }
        }
        results.innerHTML = html || '<div class="search-item">No match found</div>';
        results.style.display = 'block';
    }

    function renderCart() {
        const body = document.getElementById('cartBody');
        let total = 0;
        body.innerHTML = cart.map((item, idx) => {
            total += item.total;
            return `<tr>
                <td>${item.name}</td><td>${item.qty}</td><td>₹${item.total}</td>
                <td><i class="fas fa-trash" style="color:var(--danger)" onclick="cart.splice(${idx},1); renderCart()"></i></td>
            </tr>`;
        }).join('');
        document.getElementById('cartTotal').innerText = total;
    }

    async function checkout() {
        if(cart.length === 0) return alert("Cart empty!");
        const mobile = document.getElementById('custMobile').value;
        if(!mobile) return alert("Enter WhatsApp Number!");

        const sale = {
            id: 'SIN-' + Date.now(),
            date: new Date().toISOString(),
            customer: document.getElementById('custName').value || "Walk-in",
            mobile: mobile,
            items: [...cart],
            total: parseFloat(document.getElementById('cartTotal').innerText)
        };

        // Update Stock
        cart.forEach(item => {
            if(inventory[item.id]) inventory[item.id].stock -= item.qty;
        });

        sales.unshift(sale);
        localStorage.setItem('sintha_v4_sales', JSON.stringify(sales));
        localStorage.setItem('sintha_v4_inv', JSON.stringify(inventory));

        generatePDF(sale);

        // Reset
        cart = [];
        renderCart();
        document.getElementById('custName').value = '';
        document.getElementById('custMobile').value = '';
    }

    // --- PDF & WhatsApp ---
    function generatePDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: [80, 150] });
        const center = doc.internal.pageSize.width / 2;

        doc.setFontSize(14);
        doc.text("SINTHA SHOP", center, 10, { align: 'center' });
        doc.setFontSize(8);
        doc.text("INVOICE RECEIPT", center, 15, { align: 'center' });
        doc.text("------------------------------------------", center, 18, { align: 'center' });

        doc.text(`ID: ${data.id}`, 5, 25);
        doc.text(`Date: ${new Date(data.date).toLocaleString()}`, 5, 29);
        doc.text(`Cust: ${data.customer}`, 5, 33);

        doc.autoTable({
            startY: 38,
            head: [['Item', 'Qty', 'Total']],
            body: data.items.map(i => [i.name, i.qty, i.total]),
            theme: 'plain',
            styles: { fontSize: 7 },
            columnStyles: { 2: { halign: 'right' } }
        });

        const finalY = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(10);
        doc.text(`TOTAL AMOUNT: Rs. ${data.total}`, center, finalY, { align: 'center' });
        doc.setFontSize(8);
        doc.text("Thank you!", center, finalY + 8, { align: 'center' });

        doc.save(`${data.id}.pdf`);
        
        // WhatsApp Text trigger
        const msg = `*SINTHA SHOP BILL*%0A*Customer:* ${data.customer}%0A*Total:* ₹${data.total}%0A_PDF Invoice generated successfully._`;
        window.open(`https://wa.me/91${data.mobile}?text=${msg}`, '_blank');
    }

    // --- History Search & Filter ---
    function renderHistory() {
        const list = document.getElementById('historyList');
        const query = document.getElementById('historySearch').value.toLowerCase();
        const filter = document.getElementById('historyFilter').value;
        const now = new Date();

        const filtered = sales.filter(s => {
            const sDate = new Date(s.date);
            const matchesQuery = s.customer.toLowerCase().includes(query) || s.mobile.includes(query) || s.id.toLowerCase().includes(query);
            
            let matchesFilter = true;
            if(filter === 'today') matchesFilter = sDate.toDateString() === now.toDateString();
            if(filter === 'yesterday') {
                const yesterday = new Date(); yesterday.setDate(now.getDate() - 1);
                matchesFilter = sDate.toDateString() === yesterday.toDateString();
            }
            if(filter === 'thisMonth') matchesFilter = sDate.getMonth() === now.getMonth() && sDate.getFullYear() === now.getFullYear();

            return matchesQuery && matchesFilter;
        });

        list.innerHTML = filtered.map(s => `
            <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center">
                <div>
                    <div style="font-weight:600">${s.customer}</div>
                    <div style="font-size:0.7rem; color:var(--secondary)">${new Date(s.date).toLocaleDateString()} | ${s.id}</div>
                    <div style="font-weight:700; color:var(--primary-dark)">₹${s.total}</div>
                </div>
                <button class="btn btn-outline" style="width:auto; padding:8px" onclick='generatePDF(${JSON.stringify(s)})'>
                    <i class="fas fa-file-pdf"></i>
                </button>
            </div>
        `).join('');
    }

    // --- Dashboard Stats ---
    function updateDashboard() {
        const now = new Date();
        const startOfWeek = new Date(); startOfWeek.setDate(now.getDate() - 7);
        
        let today = 0, week = 0, month = 0, year = 0, stockVal = 0;

        sales.forEach(s => {
            const d = new Date(s.date);
            if(d.toDateString() === now.toDateString()) today += s.total;
            if(d >= startOfWeek) week += s.total;
            if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) month += s.total;
            if(d.getFullYear() === now.getFullYear()) year += s.total;
        });

        for(let id in inventory) {
            stockVal += (inventory[id].price * inventory[id].stock);
        }

        document.getElementById('statToday').innerText = '₹' + today;
        document.getElementById('statWeek').innerText = '₹' + week;
        document.getElementById('statMonth').innerText = '₹' + month;
        document.getElementById('statYear').innerText = '₹' + year;
        document.getElementById('statStockValue').innerText = '₹' + stockVal;

        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        const last7Days = [...Array(7)].map((_, i) => {
            const d = new Date(); d.setDate(d.getDate() - i); return d.toLocaleDateString('en-IN', {weekday: 'short'});
        }).reverse();
        
        const data = [...Array(7)].map((_, i) => {
            const d = new Date(); d.setDate(d.getDate() - i);
            return sales.filter(s => new Date(s.date).toDateString() === d.toDateString()).reduce((a,b) => a+b.total, 0);
        }).reverse();

        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: last7Days,
                datasets: [{ 
                    label: 'Sales', data: data, borderColor: '#6366f1', 
                    tension: 0.4, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)' 
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }

    function renderInventory() {
        const body = document.getElementById('inventoryBody');
        body.innerHTML = Object.keys(inventory).map(id => `
            <tr>
                <td><b>${inventory[id].name}</b><br><small>${id}</small></td>
                <td>₹${inventory[id].price}</td>
                <td style="font-weight:700; color:${inventory[id].stock < 5 ? 'red' : 'green'}">${inventory[id].stock}</td>
            </tr>
        `).join('');
    }

    // Init
    document.getElementById('currentDay').innerText = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'short' });
    updateDashboard();
</script>

</body>
</html>
