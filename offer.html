<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheiraoba Offer</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  height:100vh;
  background:linear-gradient(-45deg,#ff6a00,#ee0979,#00c6ff,#0072ff);
  background-size:400% 400%;
  animation:bg 10s infinite;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

h1{margin-bottom:10px;}

.wishes{
  max-width:320px;
  text-align:center;
  margin-bottom:15px;
  font-size:0.95rem;
}

/* Card */
.card{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.15);
  padding:25px;
  border-radius:20px;
  width:320px;
  text-align:center;
}

/* Price */
.price{
  font-size:2.2rem;
  font-weight:bold;
  color:#ffd60a;
  animation:scale 1.5s infinite alternate;
}
@keyframes scale{
  from{transform:scale(1)}
  to{transform:scale(1.1)}
}

.old{text-decoration:line-through;opacity:0.7}

/* Timer */
.timer{margin-top:8px;}

/* Slots (static now) */
.slots{
  color:#ffea00;
  margin-top:5px;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.5}}

/* Button */
.btn{
  margin-top:12px;
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:#ff006e;
  color:white;
  cursor:pointer;
}

/* Form & Admin */
.form,.admin-page{display:none;margin-top:10px;}

input{
  width:90%;
  padding:8px;
  margin:6px;
  border:none;
  border-radius:8px;
}

/* Admin list */
.admin-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  cursor:pointer;
}
.admin-item img{
  width:40px;height:40px;border-radius:50%;
}

/* Image modal */
.image-modal{
  display:none;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.image-modal img{width:200px;}
.image-modal span{
  position:absolute;top:20px;right:30px;
  font-size:30px;color:white;cursor:pointer;
}
</style>
</head>

<body>

<h1>🌸 Happy Cheiraoba 🌸</h1>

<div class="wishes">
  May this New Year bring happiness, prosperity, and success into your life.
</div>

<div class="card">

  <h2>Housie Website Offer</h2>
  <p class="old">₹4500</p>
  <p class="price">₹2999 Only</p>

  <div id="timer" class="timer"></div>
  <div class="slots">🔥 Only 11 slots left</div>

  <button class="btn" onclick="showForm()">Buy Website</button>

  <!-- FORM -->
  <div class="form" id="form">
    <input id="nameInput" placeholder="Your Name">
    <input id="websiteInput" placeholder="Website Name">
    <input id="mobileInput" placeholder="Mobile Number">
    <input id="emailInput" placeholder="Email">
    <button class="btn" onclick="showAdmins()">Continue</button>
  </div>

    <!-- ADMIN -->
  <div class="admin-page" id="adminPage">
    <div class="admin-item" onclick="selectAdmin('Anand Khuman','9366293440')">
      <img src="https://github.com/Anandkhuman/Photo/raw/main/anand1.jpg" onclick="showImage(event,this.src)">
      <span>Anand Khuman</span>
    </div>

    <div class="admin-item" onclick="selectAdmin('Pari Thokchom','8415934211')">
      <img src="https://github.com/Anandkhuman/Photo/raw/main/pari.jpg" onclick="showImage(event,this.src)">
      <span>Pari Thokchom</span>
    </div>

    <div class="admin-item" onclick="selectAdmin('Sadananda Mangang','916009020876')">
      <img src="https://github.com/Anandkhuman/Photo/raw/main/sadananda1.jpg" onclick="showImage(event,this.src)">
      <span>Sadananda Mangang</span>
    </div>
  </div>
</div>

<!-- Image Preview -->
<div class="image-modal" id="imageModal">
  <span onclick="closeImage()">×</span>
  <img id="modalImg">
</div>

<script>

/* Show Form */
function showForm(){
  document.getElementById("form").style.display="block";
}

/* Show Admin */
function showAdmins(){
  let n=document.getElementById("nameInput").value;
  let w=document.getElementById("websiteInput").value;
  let m=document.getElementById("mobileInput").value;
  let e=document.getElementById("emailInput").value;

  if(!n||!w||!m||!e){
    alert("Please fill all fields!");
    return;
  }

  document.getElementById("form").style.display="none";
  document.getElementById("adminPage").style.display="block";
}

/* WhatsApp */
function selectAdmin(admin,number){
  let n=document.getElementById("nameInput").value;
  let w=document.getElementById("websiteInput").value;
  let m=document.getElementById("mobileInput").value;
  let e=document.getElementById("emailInput").value;

  let msg=`Hello ${admin}%0A
I want to buy Housie Website.%0A
Name:${n}%0AWebsite:${w}%0AMobile:${m}%0AEmail:${e}%0AOffer ₹2999`;

  window.open(`https://wa.me/${number}?text=${msg}`);
}

/* Image Preview */
function showImage(event,src){
  event.stopPropagation();
  document.getElementById("imageModal").style.display="flex";
  document.getElementById("modalImg").src=src;
}
function closeImage(){
  document.getElementById("imageModal").style.display="none";
}

/* Timer */
setInterval(()=>{
 let now=new Date();
 let end=new Date();
 end.setHours(23,59,59,999);

 let diff=end-now;
 if(diff<0)return;

 let h=Math.floor(diff/1000/60/60);
 let m=Math.floor(diff/1000/60)%60;
 let s=Math.floor(diff/1000)%60;

 document.getElementById("timer").innerHTML=`⏳ ${h}h ${m}m ${s}s left today`;
},1000);

</script>

</body>
</html>
