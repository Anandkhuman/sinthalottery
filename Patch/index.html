
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sintha: Infinite</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

    :root {
        --primary: #00f2ff;
        --secondary: #ff0055;
        --bg: #050510;
        --glass: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }

    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: var(--bg);
        font-family: 'Rajdhani', sans-serif;
        color: white;
        touch-action: none;
    }

    /* BACKGROUND ANIMATION */
    #bg-layer {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 120%, #1a1a40, #000);
        z-index: -1;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
    }

    /* UI OVERLAY */
    #ui-container {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    /* HUD */
    .hud-top {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
        font-size: 24px;
        font-weight: 700;
        text-shadow: 0 0 10px var(--primary);
        letter-spacing: 2px;
        width: 100%;
    }

    /* MAIN MENU / GAME OVER */
    #menu-screen, #level-screen {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        transition: opacity 0.4s ease;
        z-index: 10;
    }

    /* LEVEL UP OVERLAY (Hidden by default) */
    #level-screen {
        background: rgba(0, 0, 0, 0.2);
        pointer-events: none;
        opacity: 0;
        z-index: 20;
    }

    #level-screen.active {
        opacity: 1;
        animation: pulseOverlay 1s infinite alternate;
    }

    h1 {
        font-size: 5rem;
        margin: 0;
        background: linear-gradient(90deg, var(--primary), #fff, var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 5px;
        text-align: center;
    }

    h2 {
        font-size: 4rem;
        color: var(--primary);
        text-shadow: 0 0 20px var(--primary);
        margin: 0;
        text-transform: uppercase;
    }

    .btn {
        margin-top: 40px;
        padding: 15px 60px;
        font-size: 1.5rem;
        font-family: 'Rajdhani', sans-serif;
        font-weight: bold;
        color: var(--primary);
        background: rgba(0, 242, 255, 0.05);
        border: 2px solid var(--primary);
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 0 15px var(--primary), inset 0 0 10px rgba(0, 242, 255, 0.2);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        text-transform: uppercase;
        pointer-events: auto;
    }

    .btn:hover {
        background: var(--primary);
        color: #000;
        box-shadow: 0 0 40px var(--primary);
        transform: scale(1.05);
    }

    #stats-detail {
        margin-top: 20px;
        color: #aaa;
        font-size: 1.2rem;
    }

    .hidden {
        opacity: 0;
        pointer-events: none !important;
    }

    @keyframes pulseOverlay {
        from { box-shadow: inset 0 0 0px var(--primary); }
        to { box-shadow: inset 0 0 50px var(--primary); }
    }
</style>
</head>
<body>

<div id="bg-layer"></div>
<canvas id="gameCanvas"></canvas>

<div id="ui-container">
    <div class="hud-top">
        <div id="score">SCORE: 0</div>
        <div id="level-indicator">LEVEL: 1</div>
        <div id="lives">❤️❤️❤️</div>
    </div>
</div>

<!-- LEVEL UP OVERLAY -->
<div id="level-screen">
    <h2 id="level-title">LEVEL COMPLETE</h2>
    <div id="health-msg" style="color:white; font-size: 1.5rem; margin-top:10px;">BONUS: +3 EXTRA HEALTH</div>
</div>

<!-- MAIN MENU -->
<div id="menu-screen">
    <h1 id="title">NEON VOID</h1>
    <div id="stats-detail">Ready System...</div>
    <button class="btn" id="start-btn">INITIALIZE</button>
</div>

<script>
/** 
 * ENGINE CONFIGURATION 
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false }); 

// Audio Context
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

let w, h;
let particles = [];
let gameRunning = false;
let animationId;

// Physics Constants
let UNIT = 0; 
let BASE_SPEED = 0;

// Game State
let state = {
    score: 0,
    lives: 3,
    level: 1,
    combo: 0
};

// Entities
const paddle = { x: 0, y: 0, width: 0, height: 0, color: '#00f2ff', targetX: 0 };

// CHANGED: Ball is now an Array of balls
let balls = []; 
let bricks = [];

/** 
 * AUDIO SYSTEM
 */
function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const now = audioCtx.currentTime;
    
    if (type === 'hit') {
        osc.frequency.setValueAtTime(400 + (state.combo * 50), now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.type = 'sine';
        osc.start(now);
        osc.stop(now + 0.1);
    } 
    else if (type === 'paddle') {
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.linearRampToValueAtTime(300, now + 0.1);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
        osc.type = 'triangle';
        osc.start(now);
        osc.stop(now + 0.15);
    }
    else if (type === 'levelup') {
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.linearRampToValueAtTime(600, now + 0.3);
        osc.frequency.linearRampToValueAtTime(400, now + 0.6);
        osc.frequency.linearRampToValueAtTime(800, now + 0.9);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 1.0);
        osc.type = 'square';
        osc.start(now);
        osc.stop(now + 1.0);
    }
    else if (type === 'lose') {
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
        osc.type = 'sawtooth';
        osc.start(now);
        osc.stop(now + 0.5);
    }
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
}

/** 
 * CORE SYSTEMS 
 */

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    UNIT = w / 100;

    paddle.width = Math.min(200, w * 0.15); 
    paddle.height = Math.max(15, h * 0.02);
    paddle.y = h - paddle.height - (h * 0.15); 
    
    if(paddle.x === 0) paddle.x = w/2 - paddle.width/2;

    // Recalculate speed based on screen size
    const speedMultiplier = 1 + ((state.level - 1) * 0.05);
    BASE_SPEED = (h * 0.008) * speedMultiplier;

    if(!gameRunning) initLevel();
}

function initLevel() {
    bricks = [];
    const cols = Math.floor(w / (Math.min(100, w * 0.1))); 
    const brickW = w / cols;
    const brickH = h * 0.04;
    const rows = Math.min(10, 4 + state.level); 

    for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
            if(Math.random() > 0.05) { 
                bricks.push({
                    x: c * brickW,
                    y: r * brickH,
                    w: brickW,
                    h: brickH,
                    status: 1,
                    color: `hsl(${c * 15 + r * 20 + (state.level * 30)}, 70%, 60%)`
                });
            }
        }
    }
    document.getElementById('level-indicator').innerText = `LEVEL: ${state.level}`;
}

// Helper to create a ball
function createBall(x, y, dx, dy, active = true) {
    let r = Math.max(6, UNIT * 0.8);
    balls.push({
        x: x, 
        y: y, 
        r: r, 
        dx: dx, 
        dy: dy, 
        active: active, 
        trail: [] 
    });
}

function resetBall() {
    balls = []; // Clear all balls
    
    // Create initial ball
    createBall(
        paddle.x + paddle.width / 2, 
        paddle.y - 20, 
        0, 
        0, 
        false // Not active yet
    );
    
    // Recalculate speed
    const speedMultiplier = 1 + ((state.level - 1) * 0.05);
    BASE_SPEED = (h * 0.008) * speedMultiplier;
    
    // Auto launch
    setTimeout(() => {
        if(state.lives > 0 && gameRunning && balls.length > 0) {
            balls[0].active = true;
            balls[0].dx = (Math.random() - 0.5) * BASE_SPEED; 
            balls[0].dy = -BASE_SPEED;
        }
    }, 1500);
}

function createExplosion(x, y, color) {
    for(let i=0; i<15; i++) {
        particles.push({
            x: x, y: y,
            dx: (Math.random() - 0.5) * (w*0.015),
            dy: (Math.random() - 0.5) * (w*0.015),
            life: 1.0,
            color: color
        });
    }
}

// --- MODIFIED FUNCTION HERE ---
function levelUp() {
    bricks = [];

    // CHANGED: ADD 3 lives to current lives (instead of resetting to 3)
    state.lives += 3; 
    
    // Update the heart display dynamically based on the number of lives
    document.getElementById('lives').innerText = "❤️".repeat(state.lives);

    playSound('levelup');
    state.level++;
    
    // Stop all balls
    balls = [];

    // Show Overlay
    const lvlScreen = document.getElementById('level-screen');
    const lvlTitle = document.getElementById('level-title');
    const healthMsg = document.getElementById('health-msg');
    
    lvlTitle.innerText = `LEVEL ${state.level} INITIATED`;
    healthMsg.innerText = `BONUS: +3 HEALTH (TOTAL: ${state.lives})`; // Show total
    
    lvlScreen.classList.add('active');

    // Wait 2 seconds then start next level
    setTimeout(() => {
        lvlScreen.classList.remove('active');
        initLevel();
        resetBall();
    }, 2000);
}
// ------------------------------

/** 
 * GAME LOOP 
 */
function update() {
    // 1. Paddle Movement
    paddle.x += (paddle.targetX - paddle.width/2 - paddle.x) * 0.15;
    if(paddle.x < 0) paddle.x = 0;
    if(paddle.x + paddle.width > w) paddle.x = w - paddle.width;

    // 2. Ball Loop (Handle multiple balls)
    for(let i = balls.length - 1; i >= 0; i--) {
        let b = balls[i];

        if(b.active) {
            b.x += b.dx;
            b.y += b.dy;

            b.trail.push({x: b.x, y: b.y, alpha: 1});
            if(b.trail.length > 10) b.trail.shift();

            // Wall Collisions
            if(b.x + b.r > w || b.x - b.r < 0) b.dx *= -1;
            if(b.y - b.r < 0) b.dy *= -1;

            // Paddle Collision
            if(b.y + b.r > paddle.y && 
               b.y - b.r < paddle.y + paddle.height && 
               b.x > paddle.x && 
               b.x < paddle.x + paddle.width) {
                
                b.dy = -Math.abs(b.dy); 
                let hitPoint = b.x - (paddle.x + paddle.width/2);
                b.dx = hitPoint * (0.15); 
                
                playSound('paddle');
                createExplosion(b.x, b.y, '#00f2ff');
                state.combo = 0; // Reset combo on paddle touch
            }

            // Brick Collision Loop
            let hitBrickFrame = false;

            for(let j=0; j<bricks.length; j++) {
                let brick = bricks[j];
                if(brick.status === 1) {
                    if(b.x > brick.x && b.x < brick.x + brick.w && 
                       b.y > brick.y && b.y < brick.y + brick.h) {
                        
                        b.dy *= -1;
                        brick.status = 0;
                        hitBrickFrame = true;
                        
                        state.score += 1;
                        document.getElementById('score').innerText = `SCORE: ${state.score}`;
                        
                        // Increase Combo
                        state.combo++;

                        if(state.combo > 1) {
                            // Spawn new ball moving downwards
                            createBall(
                                brick.x + brick.w/2, 
                                brick.y + brick.h/2, 
                                (Math.random() - 0.5) * BASE_SPEED, 
                                Math.abs(BASE_SPEED) // Move down
                            );
                        }
                        
                        playSound('hit');
                        createExplosion(b.x, b.y, brick.color);
                    }
                }
            }

            // Floor Collision (Remove ball)
            if(b.y - b.r > h) {
                balls.splice(i, 1);
            }
        } else {
            // Ball stuck to paddle (Start of game)
            b.x = paddle.x + paddle.width/2;
            b.y = paddle.y - b.r - 2;
        }
    }

    // CHECK GAME STATE
    
    // Level Complete Check
    const activeBricks = bricks.filter(b => b.status === 1).length;
    if(activeBricks === 0 && bricks.length > 0) {
        levelUp();
        return; 
    }

    // Life Lost Check (Only if ALL balls are gone and we started playing)
    if(balls.length === 0 && gameRunning) {
        state.lives--;
        state.combo = 0;
        playSound('lose');
        
        // Prevent negative repeat error
        let hearts = state.lives > 0 ? "❤️".repeat(state.lives) : "";
        document.getElementById('lives').innerText = hearts;
        
        if(state.lives <= 0) {
            gameOver();
        } else {
            resetBall();
        }
    }

    // 3. Particles
    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i];
        p.x += p.dx;
        p.y += p.dy;
        p.life -= 0.03;
        if(p.life <= 0) particles.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0,0,w,h);

    // Draw Bricks
    bricks.forEach(b => {
        if(b.status === 1) {
            ctx.fillStyle = b.color;
            ctx.shadowColor = b.color;
            ctx.shadowBlur = 15;
            ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h * 0.4);
        }
    });

    // Draw Paddle
    ctx.fillStyle = "rgba(0, 242, 255, 0.2)";
    ctx.strokeStyle = "#00f2ff";
    ctx.lineWidth = 2;
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00f2ff";
    ctx.beginPath();
    ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 10);
    ctx.fill();
    ctx.stroke();

    // Draw Balls (Loop through array)
    balls.forEach(b => {
        // Trail
        b.trail.forEach((t, i) => {
            ctx.beginPath();
            ctx.arc(t.x, t.y, b.r * (i/10), 0, Math.PI*2);
            ctx.fillStyle = `rgba(0, 242, 255, ${t.alpha * 0.3})`;
            ctx.fill();
        });

        // Ball Body
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        ctx.fillStyle = "#fff";
        ctx.shadowColor = "#fff";
        ctx.shadowBlur = 15;
        ctx.fill();
    });

    // Draw Particles
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
}

function loop() {
    if(gameRunning) {
        update();
        draw();
        animationId = requestAnimationFrame(loop);
    }
}

/** 
 * INPUT HANDLING 
 */
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => {
    paddle.targetX = e.clientX;
});
window.addEventListener('touchmove', e => {
    e.preventDefault(); 
    paddle.targetX = e.touches[0].clientX;
}, {passive: false});

/** 
 * UI LOGIC 
 */
const menu = document.getElementById('menu-screen');
const startBtn = document.getElementById('start-btn');
const title = document.getElementById('title');
const stats = document.getElementById('stats-detail');

startBtn.addEventListener('click', () => {
    state.score = 0;
    state.lives = 3;
    state.level = 1;
    state.combo = 0;
    document.getElementById('score').innerText = "SCORE: 0";
    document.getElementById('lives').innerText = "❤️❤️❤️";
    document.getElementById('level-indicator').innerText = "LEVEL: 1";

    menu.classList.add('hidden');
    gameRunning = true;
    
    resize();
    initLevel();
    paddle.x = w/2 - paddle.width/2; 
    paddle.targetX = w/2;
    resetBall();
    loop();
});

function gameOver() {
    gameRunning = false;
    cancelAnimationFrame(animationId);
    
    menu.classList.remove('hidden');
    title.innerText = "GAME OVER";
    title.style.background = "linear-gradient(90deg, #ff0055, #fff, #ff0055)";
    title.style.webkitBackgroundClip = "text";
    stats.innerText = `Final Score: ${state.score} | Level ${state.level}`;
    startBtn.innerText = "RETRY SYSTEM";
}

// Initial Setup
resize();

</script>
</body>
</html>
